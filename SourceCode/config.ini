[AppSettings]
###############################################################################
# All-in-1 Converter - configuration file
#
# Lives next to the binary at runtime. Every download class reads from here
# (DatabaseConfig.cs, Furnidata.cs, ClothesDownloader.cs, ...). Comments and
# blank lines are ignored.
###############################################################################

###############################################################################
# Habbo Original Hotels
# -----------------------------------------------------------------------------
# Default is the Dutch (.nl) hotel. Swap the country TLD to switch hotel:
# "com", "fr", "fi", "es", "nl", "de", "it", "com.tr", "com.br".
# Note: Item IDs and offer_id values are NOT the same across hotels.
###############################################################################

externalvarsurl=https://www.habbo.nl/gamedata/external_variables/1
externaltexturl=https://habbo.nl/gamedata/external_flash_texts/1
furnitureurl=http://images.habbo.com/dcr/hof_furni
productdataurl=https://habbo.nl/gamedata/productdata/1
furnidataTXT=https://habbo.nl/gamedata/furnidata/1
furnidataXML=https://www.habbo.nl/gamedata/furnidata_xml/1
receptionurl=http://images.habbo.com/c_images/reception
catalogurl=http://habboo-a.akamaihd.net/c_images/catalogue
promosmallurl=http://images.habbo.com/c_images/web_promo_small
catalogiconurl=https://images.habbo.com/c_images/catalogue/icon_
soundmachineurl=https://images.habbo.com/dcr/hof_furni/mp3/sound_machine_sample_
effecturl=https://images.habbo.com/gordon
questsurl=https://images.habbo.com/c_images/Quests

###############################################################################
# Nitro Retro Hotels (custom downloads)
# -----------------------------------------------------------------------------
# Replace ##DOMAIN## with the host of the retro you want to pull from. The
# values mirror the keys of the renderer-config.json that the Nitro V3 client
# reads, so you can copy them straight over.
#
# DUAL-FORMAT SUPPORT (Nitro V3 split-mode):
#   * If the URL points at a single .json file -> legacy flat layout.
#     Example:
#       nitro_furnidataJSON=https://example/gamedata/config/FurnitureData.json
#
#   * If the URL ends with a "/" -> JSON5 split layout (manifest.json5 +
#     core/custom/seasonal/ tier directories, same layout produced by
#     Nitro-V3/scripts/split-gamedata.mjs). The downloader mirrors every
#     tier locally and merges them in load order; the rest of the pipeline
#     keeps consuming a single merged flat JSON, so no other code path
#     needs to know which layout the retro uses.
#     Example:
#       nitro_furnidataJSON=https://example/gamedata/furnidata/
#       nitro_figuredata=https://example/gamedata/figuredata/
#       nitro_figuremap=https://example/gamedata/figuremap/
###############################################################################

# renderer-config.json => furnidata.url
# Flat:  https://your-retro-domain.example/gamedata/config/FurnitureData.json
# Split: https://your-retro-domain.example/gamedata/furnidata/
nitro_furnidataJSON=https://your-retro-domain.example/gamedata/furnidata/
# renderer-config.json => furni.asset.url
nitro_furnitureurl=https://your-retro-domain.example/gamedata/furniture
# renderer-config.json => furni.asset.icon.url
nitro_furniture_icon_url=https://your-retro-domain.example/gamedata/icons

# renderer-config.json => avatar.asset.url
nitro_clothes_dir=https://your-retro-domain.example/gamedata/clothes
# renderer-config.json => avatar.figuredata.url
# Flat:  https://your-retro-domain.example/gamedata/config/FigureData.json
# Split: https://your-retro-domain.example/gamedata/figuredata/
nitro_figuredata=https://your-retro-domain.example/gamedata/figuredata/
# renderer-config.json => avatar.figuremap.url
# Flat:  https://your-retro-domain.example/gamedata/config/FigureMap.json
# Split: https://your-retro-domain.example/gamedata/figuremap/
nitro_figuremap=https://your-retro-domain.example/gamedata/figuremap/

###############################################################################
# Database settings (used by Database Tools menu)
# -----------------------------------------------------------------------------
# MariaDB / MySQL credentials. The defaults below match a stock Arcturus
# install on localhost; change them to your own setup.
###############################################################################

DATABASESERVER=127.0.0.1
DATABASEPORT=3306
DATABASEUSER=arcturus
DATABASEPASSWORD=arcturus
DATABASENAME=arcturus
