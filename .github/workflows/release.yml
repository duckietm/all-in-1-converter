name: Release

# Auto-publishes a GitHub Release every time main moves (direct commit or
# merge of an approved PR). PR runs themselves never trigger this workflow,
# so a contributor's draft branch can't accidentally cut a release.
#
# Version is generated as v<YYYY.MM.DD>.<run-number> (e.g. v2026.05.22.7).
# Manual dispatch is also available with a custom tag input.

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Override tag (default: auto v<date>.<run>)'
        required: false

jobs:
  build-windows:
    name: Build Windows x64
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: Publish win-x64
        working-directory: SourceCode
        run: |
          dotnet publish "Habbo Downloader.csproj" `
            -c Release -r win-x64 --self-contained true `
            -p:PublishSingleFile=true `
            -p:EnableCompressionInSingleFile=true `
            -p:DebugType=none -p:DebugSymbols=false `
            -o ../publish/win-x64
      - name: Zip
        shell: pwsh
        run: |
          Compress-Archive -Path publish/win-x64/* -DestinationPath all-in-1-converter-win-x64.zip
      - uses: actions/upload-artifact@v4
        with:
          name: win-x64-zip
          path: all-in-1-converter-win-x64.zip
          if-no-files-found: error

  build-linux:
    name: Build Linux x64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: Publish linux-x64
        working-directory: SourceCode
        run: |
          dotnet publish "Habbo Downloader.csproj" \
            -c Release -r linux-x64 --self-contained true \
            -p:PublishSingleFile=true \
            -p:EnableCompressionInSingleFile=true \
            -p:DebugType=none -p:DebugSymbols=false \
            -o ../publish/linux-x64
      - name: Make binary executable + drop .desktop entry
        run: |
          chmod +x "publish/linux-x64/Habbo Downloader"
          cat > publish/linux-x64/all-in-1-converter.desktop <<'EOF'
          [Desktop Entry]
          Type=Application
          Name=All-in-1 Converter
          Comment=Habbo asset workstation (Mainframe / Matrix GUI)
          Exec=./Habbo\ Downloader --gui
          Terminal=false
          Categories=Development;Utility;
          EOF
      - name: Tar.gz
        run: |
          cd publish && tar -czf ../all-in-1-converter-linux-x64.tar.gz linux-x64/
      - uses: actions/upload-artifact@v4
        with:
          name: linux-x64-tarball
          path: all-in-1-converter-linux-x64.tar.gz
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: win-x64-zip
      - uses: actions/download-artifact@v4
        with:
          name: linux-x64-tarball
      - name: Resolve tag
        id: tag
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            echo "value=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            DATE=$(date -u +%Y.%m.%d)
            echo "value=v${DATE}.${{ github.run_number }}" >> "$GITHUB_OUTPUT"
          fi
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.value }}
          name: ${{ steps.tag.outputs.value }}
          generate_release_notes: true
          files: |
            all-in-1-converter-win-x64.zip
            all-in-1-converter-linux-x64.tar.gz
