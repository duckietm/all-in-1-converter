name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-windows:
    name: Build Windows x64
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: Restore
        working-directory: SourceCode
        run: dotnet restore "Habbo Downloader.csproj"
      - name: Publish win-x64 (self-contained, single file)
        working-directory: SourceCode
        run: |
          dotnet publish "Habbo Downloader.csproj" `
            -c Release `
            -r win-x64 `
            --self-contained true `
            -p:PublishSingleFile=true `
            -p:EnableCompressionInSingleFile=true `
            -p:DebugType=none `
            -p:DebugSymbols=false `
            -o ../publish/win-x64
      - uses: actions/upload-artifact@v4
        with:
          name: all-in-1-converter-win-x64
          path: publish/win-x64/
          if-no-files-found: error
          retention-days: 30

  build-linux:
    name: Build Linux x64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: Restore
        working-directory: SourceCode
        run: dotnet restore "Habbo Downloader.csproj"
      - name: Publish linux-x64 (self-contained, single file)
        working-directory: SourceCode
        run: |
          dotnet publish "Habbo Downloader.csproj" \
            -c Release \
            -r linux-x64 \
            --self-contained true \
            -p:PublishSingleFile=true \
            -p:EnableCompressionInSingleFile=true \
            -p:DebugType=none \
            -p:DebugSymbols=false \
            -o ../publish/linux-x64
      - name: chmod +x
        run: chmod +x "publish/linux-x64/Habbo Downloader"
      - name: Add .desktop file for double-click GUI launch
        run: |
          cat > publish/linux-x64/all-in-1-converter.desktop <<'EOF'
          [Desktop Entry]
          Type=Application
          Name=All-in-1 Converter
          Comment=Habbo asset workstation (Mainframe / Matrix GUI)
          Exec=./Habbo\ Downloader --gui
          Terminal=false
          Categories=Development;Utility;
          EOF
      - uses: actions/upload-artifact@v4
        with:
          name: all-in-1-converter-linux-x64
          path: publish/linux-x64/
          if-no-files-found: error
          retention-days: 30
